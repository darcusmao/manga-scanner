detection:
  model_path: "yolov8n.pt"
  confidence_threshold: 0.45
  device: "cpu"
  box_padding: 8

inpainting:
  model_name: "cv2"
  device: "cpu"

ocr:
  device: "cpu"

translation:
  # backend: "ollama" | "deepl" | "google"
  # deepl and google are instant API calls (~ms vs ~5min for cold Ollama).
  # Set API keys via env vars to avoid committing secrets:
  #   MANGA_TRANSLATION__DEEPL_API_KEY=your-key-here
  #   MANGA_TRANSLATION__GOOGLE_API_KEY=your-key-here
  backend: "ollama"
  # Ollama settings (only used when backend = "ollama")
  ollama_url: "http://localhost:11434"
  model_name: "qwen2.5:7b-instruct-q4_K_M"
  temperature: 0.2
  max_retries: 2
  timeout_seconds: 300

typesetting:
  font_path: "fonts/Bangers-Regular.ttf"
  max_font_size: 24
  min_font_size: 8
  text_color: "#000000"
  padding: 6

pipeline:
  skip_existing: true

paths:
  output_dir: "data/output"
